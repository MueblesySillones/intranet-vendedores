<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intranet · Vendedores · Mueblesysillones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
:root{
  --bg:#F0EDE8; --bg2:#E8E4DF; --surface:#FFFFFF;
  --ink:#111111; --ink2:#444444; --ink3:#6E6E6E;
  --border:rgba(0,0,0,0.10); --border2:rgba(0,0,0,0.06);
  --c-hudson:#1A1A2E; --c-caba:#2C6E8A; --c-canning:#3A7A55; --c-norcenter:#8A5A2C;
  --c-success:#1A6A3A; --c-warn:#9A6A00; --c-danger:#B4231F; --c-info:#1A4A8A;
}
html,body{ font-family:'Montserrat',sans-serif; background:var(--bg); color:var(--ink); min-height:100%; }
.ico svg{ width:100%; height:100%; display:block; fill:none; stroke:currentColor; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
.icirc{ border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--surface); border:1px solid var(--border); color:var(--ink); flex:0 0 auto; }

/* top bar */
.top{ position:sticky; top:0; z-index:50; background:rgba(255,255,255,.88); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border); display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:10px; padding:13px 26px; }
.brand{ grid-column:2; justify-self:center; display:flex; align-items:center; cursor:pointer; }
.brand img{ width:104px; filter:brightness(0); opacity:.9; display:block; }
.top-r{ grid-column:3; justify-self:end; display:flex; align-items:center; gap:10px; }
.home-btn{ display:flex; align-items:center; gap:8px; padding:9px 18px; border-radius:8px; border:1.5px solid var(--ink);
  background:transparent; color:var(--ink); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; letter-spacing:.4px; transition:.2s; }
.home-btn:hover{ background:var(--ink); color:#fff; }
.home-btn .ico{ width:15px; height:15px; }
/* boton menu (solo mobile) */
.menu-btn{ display:none; align-items:center; gap:8px; padding:11px 16px; min-height:44px; border-radius:8px; border:1.5px solid var(--ink);
  background:transparent; color:var(--ink); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; letter-spacing:.4px; transition:.2s; }
.menu-btn:hover{ background:var(--ink); color:#fff; }
.menu-btn .ico{ width:18px; height:18px; }
/* drawer de navegacion */
.navmenu{ position:fixed; inset:0; z-index:120; }
.navmenu[hidden]{ display:none; }
.nav-ov{ position:absolute; inset:0; background:rgba(0,0,0,.45); opacity:0; transition:opacity .22s ease; }
.nav-panel{ position:absolute; top:0; right:0; height:100%; width:86%; max-width:340px; background:var(--bg);
  box-shadow:-12px 0 44px rgba(0,0,0,.28); display:flex; flex-direction:column; transform:translateX(100%); transition:transform .26s cubic-bezier(.22,.61,.36,1); }
.navmenu.open .nav-ov{ opacity:1; }
.navmenu.open .nav-panel{ transform:translateX(0); }
.nav-head{ display:flex; align-items:center; justify-content:space-between; padding:18px 18px 13px; border-bottom:1px solid var(--border); }
.nav-head .nh-t{ font-size:12px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--ink3); }
.nav-close{ width:40px; height:40px; border-radius:8px; border:1px solid var(--border); background:var(--surface); color:var(--ink2);
  display:flex; align-items:center; justify-content:center; cursor:pointer; }
.nav-close svg{ width:16px; height:16px; }
.nav-list{ flex:1; overflow-y:auto; padding:11px; display:flex; flex-direction:column; gap:7px; }
.nav-item{ display:flex; align-items:center; gap:13px; width:100%; text-align:left; background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:11px 13px; font-family:inherit; cursor:pointer; transition:border-color .15s, transform .15s; }
.nav-item:hover{ border-color:var(--ink); transform:translateX(-2px); }
.nav-item.locked{ cursor:default; opacity:.62; }
.nav-item.locked:hover{ border-color:var(--border); transform:none; }
.nav-item .ni-ic{ width:40px; height:40px; border-radius:10px; color:#fff; display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
.nav-item .ni-ic .ico{ width:20px; height:20px; }
.nav-item .ni-tx{ flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
.nav-item .ni-t{ font-size:14px; font-weight:700; color:var(--ink); line-height:1.15; }
.nav-item .ni-d{ font-size:11px; color:var(--ink3); line-height:1.25; }
.nav-item .chip{ flex:0 0 auto; align-self:center; }
body.menu-open{ overflow:hidden; }
@media(max-width:860px){
  .menu-btn{ display:inline-flex; }
  #homeBtn{ display:none !important; }
  .top{ padding:12px 18px; } .brand img{ width:96px; }
}

main{ max-width:1080px; margin:0 auto; padding:40px 26px 80px; }

/* hero */
.hero .eyebrow{ font-size:12px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--ink3); margin-bottom:12px; }
.hero h1{ font-size:clamp(26px,7vw,46px); font-weight:800; letter-spacing:-1.5px; line-height:1.08; text-wrap:balance; }
.hero p{ font-size:15px; color:var(--ink3); margin-top:10px; font-weight:400; max-width:560px; }

/* botonera */
.botonera{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-top:34px; }
.tile{ text-align:left; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 22px;
  display:flex; flex-direction:column; gap:16px; cursor:pointer; font-family:inherit; transition:transform .18s, box-shadow .18s, border-color .18s; position:relative; }
.tile:hover{ transform:translateY(-4px); box-shadow:0 14px 34px rgba(0,0,0,.10); border-color:var(--ink); }
.tile.locked{ cursor:default; opacity:.62; }
.tile.locked:hover{ transform:none; box-shadow:none; border-color:var(--border); }
.tile .icirc{ width:60px; height:60px; color:#fff; }
.tile .icirc .ico{ width:28px; height:28px; }
.tile .tt{ font-size:17px; font-weight:800; letter-spacing:-.3px; line-height:1.2; }
.tile .td{ font-size:12.5px; color:var(--ink3); line-height:1.45; font-weight:500; flex:1; }
.tile .num{ position:absolute; top:18px; right:20px; font-size:13px; font-weight:800; color:var(--ink3); opacity:.55; }
.chip{ display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:30px; font-size:10.5px; font-weight:700; letter-spacing:.4px; align-self:flex-start; }
.chip .dot{ width:6px; height:6px; border-radius:50%; }
.chip.ok{ background:#D4EDDA; color:#145A2E; } .chip.ok .dot{ background:#1A6A3A; }
.chip.soon{ background:#ECE9E3; color:#7A756C; } .chip.soon .dot{ background:#A39C90; }

/* vista de seccion */
.back{ display:inline-flex; align-items:center; gap:8px; padding:9px 16px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface); color:var(--ink2); font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; margin-bottom:24px; transition:.2s; }
.back:hover{ border-color:var(--ink); color:var(--ink); }
.back .ico{ width:16px; height:16px; }
.sec-head{ display:flex; align-items:center; gap:18px; margin-bottom:8px; }
.sec-head .icirc{ width:64px; height:64px; color:#fff; }
.sec-head .icirc .ico{ width:30px; height:30px; }
.sec-head h2{ font-size:clamp(24px,4vw,34px); font-weight:800; letter-spacing:-1px; line-height:1.05; }
.sec-head .sub{ font-size:14px; color:var(--ink3); margin-top:4px; font-weight:500; }
.sec-body{ margin-top:26px; }
.lead{ font-size:16px; color:var(--ink2); line-height:1.6; max-width:680px; }
.cta{ display:inline-flex; align-items:center; gap:10px; margin-top:22px; padding:15px 26px; border-radius:12px; background:var(--ink);
  color:#fff; text-decoration:none; font-size:15px; font-weight:700; letter-spacing:.3px; transition:.2s; }
.cta:hover{ opacity:.88; transform:translateY(-2px); }
.cta .ico{ width:20px; height:20px; }
.cta.alt{ background:var(--surface); color:var(--ink); border:1.5px solid var(--ink); margin-left:12px; }
.hint{ font-size:12px; color:var(--ink3); margin-top:14px; }
.report-frame{ margin-top:24px; border:1px solid var(--border); border-radius:16px; overflow:hidden; background:#222; box-shadow:0 14px 40px rgba(0,0,0,.14); }
.report-frame iframe{ width:100%; height:560px; border:0; display:block; }

/* estado pendiente */
.pending{ margin-top:24px; background:var(--surface); border:1px dashed var(--border); border-radius:18px; padding:46px 32px; text-align:center; }
.pending .icirc{ width:78px; height:78px; margin:0 auto 20px; background:var(--bg2); color:var(--ink3); border:none; }
.pending .icirc .ico{ width:34px; height:34px; }
.pending h3{ font-size:20px; font-weight:800; letter-spacing:-.4px; }
.pending p{ font-size:14px; color:var(--ink3); margin-top:10px; line-height:1.6; max-width:460px; margin-left:auto; margin-right:auto; }
.empty-cat{ display:flex; align-items:center; gap:10px; margin-top:16px; background:var(--surface); border:1px dashed var(--border); border-radius:14px; padding:18px 20px; color:var(--ink3); font-size:14px; }
.empty-cat .ico{ width:20px; height:20px; flex:none; color:var(--ink3); }

/* galeria de imagenes / flyers */
.gallery{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-top:24px; }
.gcard{ background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; display:flex; flex-direction:column; transition:box-shadow .18s; }
.gcard:hover{ box-shadow:0 12px 30px rgba(0,0,0,.10); }
.gcard .gimg{ width:100%; aspect-ratio:4/5; object-fit:contain; background:var(--bg2); cursor:zoom-in; display:block; }
.gcard .gmeta{ padding:14px 16px; display:flex; flex-direction:column; gap:11px; }
.gcard .gtitle{ font-size:13px; font-weight:700; color:var(--ink); line-height:1.3; }
.dl-btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:11px 12px; border-radius:10px;
  background:var(--ink); color:#fff; text-decoration:none; font-size:13px; font-weight:700; letter-spacing:.3px; transition:.2s; }
.dl-btn:hover{ opacity:.88; }
.dl-btn .ico{ width:16px; height:16px; }
/* visor ampliado */
#lightbox{ position:fixed; inset:0; z-index:200; background:rgba(0,0,0,.86); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:56px 16px 24px; cursor:zoom-out; }
#lightbox[hidden]{ display:none; }
#lightbox img{ max-width:100%; max-height:78vh; border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,.5); cursor:default; }
#lightbox .lb-dl{ position:static; transform:none; }
#lightbox .lb-close{ position:absolute; top:14px; right:14px; width:44px; height:44px; border-radius:10px; border:none; background:rgba(255,255,255,.14); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; }
#lightbox .lb-close .ico{ width:22px; height:22px; }
.footer{ text-align:center; font-size:11px; color:var(--ink3); padding:30px 0 10px; letter-spacing:.5px; }
@media (max-width:860px){ .gallery{ grid-template-columns:repeat(2,1fr); } }
@media (max-width:520px){ .gallery{ grid-template-columns:1fr; } }

/* placa / flyer a pantalla (ej. Embajadores) */
.flyer{ margin-top:24px; text-align:center; background:var(--bg2); border:1px solid var(--border); border-radius:16px; padding:18px; }
.flyer img{ max-width:520px; width:100%; border-radius:10px; box-shadow:0 14px 40px rgba(0,0,0,.16); cursor:zoom-in; transition:transform .15s; display:block; margin:0 auto; }
.flyer img:hover{ transform:scale(1.01); }

@media (max-width:860px){
  .botonera{ grid-template-columns:repeat(2,1fr); gap:14px; }
  main{ padding:30px 18px 60px; }
  .report-frame iframe{ height:420px; }
  .cta.alt{ margin-left:0; margin-top:12px; }
}
@media (max-width:520px){
  .botonera{ grid-template-columns:1fr; }
  .top{ padding:11px 14px; } .brand img{ width:92px; }
  .menu-btn{ padding:11px 14px; }
  .sec-head{ gap:14px; } .sec-head .icirc{ width:52px; height:52px; }
  .cta{ width:100%; justify-content:center; } .cta.alt{ width:100%; }
  .flow .step .sd{ font-size:12px; } .nav-item .ni-d{ font-size:12px; } .benefit .bd{ font-size:12px; }
  .m-h{ font-size:17px; } .m-block{ margin-top:26px; }
  .m-kicker{ letter-spacing:1px; align-items:flex-start; line-height:1.3; } .m-kicker .n{ margin-top:1px; }
  .tut-fig img{ max-height:62vh; }
  .situ{ padding:14px 12px; } .situ .chat{ padding:12px 10px; } .situ .chat .bubble{ max-width:90%; }
  .note{ gap:10px; padding:12px 13px; } .note svg{ width:18px; height:18px; margin-top:2px; }
}

/* ---- Manual de derivaciones (contenido enriquecido) ---- */
.manual{ max-width:760px; }
.manual .m-lead{ font-size:16px; color:var(--ink2); line-height:1.6; }
.manual .m-lead b{ color:var(--ink); }
.m-block{ margin-top:38px; }
.m-kicker{ font-size:11px; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--ink3); margin-bottom:12px; display:flex; align-items:center; gap:9px; }
.m-kicker .n{ display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:50%; background:var(--ink); color:#fff; font-size:11px; font-weight:800; letter-spacing:0; flex:0 0 auto; }
.m-kicker .ico{ width:16px; height:16px; flex:0 0 auto; }
.m-h{ font-size:20px; font-weight:800; letter-spacing:-.5px; color:var(--ink); }
.m-sub{ font-size:13px; color:var(--ink3); margin-top:3px; }
.m-p{ font-size:14.5px; color:var(--ink2); line-height:1.6; margin-top:12px; } .m-p b{ color:var(--ink); }

/* proceso con flechas */
.flow{ display:flex; align-items:stretch; margin-top:4px; }
.flow .step{ flex:1; min-width:0; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px 12px; text-align:center; }
.flow .step .si{ width:36px; height:36px; margin:0 auto 9px; color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; }
.flow .step .si svg{ width:18px; height:18px; }
.flow .step .st{ font-size:12.5px; font-weight:800; color:var(--ink); line-height:1.2; }
.flow .step .sd{ font-size:11px; color:var(--ink3); margin-top:4px; line-height:1.35; }
.flow .arrow{ display:flex; align-items:center; justify-content:center; color:var(--ink3); padding:0 6px; flex:0 0 auto; }
.flow .arrow svg{ width:20px; height:20px; }
@media(max-width:600px){ .flow{ flex-direction:column; } .flow .arrow{ transform:rotate(90deg); padding:7px 0; } }

/* chat estilo whatsapp */
.chat{ margin-top:14px; background:#E7E0D7; border:1px solid var(--border); border-radius:16px; padding:15px 14px; display:flex; flex-direction:column; gap:9px;
  background-image:radial-gradient(rgba(0,0,0,.03) 1px, transparent 1px); background-size:18px 18px; }
.chat .blabel{ font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--ink3); }
.bubble{ max-width:84%; padding:10px 13px; border-radius:14px; font-size:14px; line-height:1.45; box-shadow:0 1px 1px rgba(0,0,0,.07); }
.bubble.out{ align-self:flex-end; background:#D7FBCB; border-top-right-radius:4px; color:#0d1b0d; }
.bubble.in{ align-self:flex-start; background:#fff; border-top-left-radius:4px; color:var(--ink); }
.bubble .time{ display:block; font-size:9.5px; color:rgba(0,0,0,.42); text-align:right; margin-top:4px; }
/* botones estilo whatsapp debajo de la burbuja */
.bbtns{ align-self:flex-end; width:84%; max-width:300px; display:flex; flex-direction:column; gap:3px; margin-top:2px; }
.bbtn{ background:#fff; border-radius:8px; padding:9px 10px; font-size:13px; font-weight:600; color:var(--c-caba); display:flex; align-items:center; justify-content:center; gap:7px; box-shadow:0 1px 1px rgba(0,0,0,.06); }
.bbtn .ico{ width:15px; height:15px; flex:0 0 auto; }
/* ====== Mock realista de WhatsApp ====== */
.wa{ max-width:390px; margin:18px auto 4px; border-radius:12px; overflow:hidden; box-shadow:0 16px 44px rgba(0,0,0,.20); border:1px solid var(--border); background:#efeae2; }
.wa.mini{ max-width:100%; margin:8px 0 0; }
.wa-top{ display:flex; align-items:center; gap:11px; background:#008069; color:#fff; padding:9px 13px; }
.wa-top .ico{ width:20px; height:20px; flex:0 0 auto; }
.wa-top .ico svg{ stroke:#fff; }
.wa-av{ width:38px; height:38px; border-radius:50%; background:#dfe5e7; color:#008069; font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center; flex:0 0 auto; letter-spacing:-.5px; }
.wa-id{ flex:1; min-width:0; }
.wa-name{ font-size:15px; font-weight:600; line-height:1.15; display:flex; align-items:center; gap:5px; }
.wa-name .v{ width:14px; height:14px; flex:0 0 auto; }
.wa-name .v svg{ stroke:#fff; }
.wa-status{ font-size:11.5px; opacity:.85; margin-top:1px; }
.wa-acts{ display:flex; gap:18px; align-items:center; }
.wa-body{ padding:16px 12px 18px; display:flex; flex-direction:column; gap:9px; background:#efeae2;
  background-image:radial-gradient(rgba(0,0,0,.022) 1px, transparent 1px); background-size:16px 16px; }
.wa-sys{ align-self:center; background:#fff; color:#54656f; font-size:10.5px; font-weight:700; letter-spacing:.4px; padding:5px 12px; border-radius:8px; box-shadow:0 1px 1px rgba(0,0,0,.07); margin:3px 0; text-transform:uppercase; text-align:center; }
.wa-msg{ position:relative; max-width:80%; padding:7px 9px 7px 10px; border-radius:8px; font-size:14.2px; line-height:1.42; color:#111b21; box-shadow:0 1px .6px rgba(0,0,0,.16); word-wrap:break-word; }
.wa-msg.out{ align-self:flex-end; background:#d9fdd3; border-top-right-radius:0; }
.wa-msg.in{ align-self:flex-start; background:#fff; border-top-left-radius:0; }
.wa-msg.out::after{ content:""; position:absolute; top:0; right:-8px; width:0; height:0; border:8px solid transparent; border-top-color:#d9fdd3; border-right-width:0; }
.wa-msg.in::after{ content:""; position:absolute; top:0; left:-8px; width:0; height:0; border:8px solid transparent; border-top-color:#fff; border-left-width:0; }
.wa-time{ float:right; font-size:10.5px; color:#667781; margin:7px -2px -2px 10px; display:inline-flex; align-items:center; gap:3px; }
.wa-tick{ display:inline-flex; }
.wa-tick svg{ width:16px; height:11px; stroke:#53bdeb; stroke-width:1.7; fill:none; stroke-linecap:round; stroke-linejoin:round; }
.wa-btns{ align-self:flex-end; width:80%; max-width:300px; display:flex; flex-direction:column; gap:2px; margin-top:1px; }
.wa-btn{ background:#fff; color:#0096de; border-radius:7px; padding:9px; font-size:13.5px; font-weight:500; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 1px .6px rgba(0,0,0,.16); }
.wa-btn .ico{ width:16px; height:16px; flex:0 0 auto; }
.wa-btn .ico svg{ stroke:#0096de; }
@media(max-width:520px){ .wa{ max-width:100%; } }

/* checklist */
.checklist{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:14px; }
.checklist .ci{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 13px; font-size:13.5px; font-weight:600; color:var(--ink); }
.checklist .ci svg{ width:17px; height:17px; color:var(--c-success); flex:0 0 auto; }
@media(max-width:520px){ .checklist{ grid-template-columns:1fr; } }

/* tarjeta de situacion (con flecha) */
.situ{ margin-top:14px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:16px; }
.situ .sit-head{ display:flex; align-items:flex-start; gap:10px; font-size:14px; font-weight:800; color:var(--ink); line-height:1.3; }
.situ .sit-tag{ font-size:10px; font-weight:800; letter-spacing:.6px; text-transform:uppercase; color:#fff; background:var(--c-warn); padding:3px 9px; border-radius:20px; flex:0 0 auto; margin-top:1px; }
.situ .sit-arrow{ display:flex; align-items:center; gap:7px; color:var(--c-success); font-size:11px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; margin:13px 0 0; }
.situ .sit-arrow svg{ width:16px; height:16px; }

/* nota / tip */
.note{ margin-top:14px; display:flex; gap:12px; background:#F4F1EA; border:1px solid var(--border); border-left:3px solid var(--ink); border-radius:12px; padding:13px 15px; }
.note svg{ width:20px; height:20px; color:var(--ink); flex:0 0 auto; margin-top:1px; }
.note .nt{ font-size:13.5px; color:var(--ink2); line-height:1.5; } .note .nt b{ color:var(--ink); }

/* tutorial chatbot (pasos con captura) */
.tut-fig{ margin:14px 0 0; background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:14px; text-align:center; }
.tut-fig img{ max-width:100%; max-height:440px; border-radius:9px; box-shadow:0 4px 18px rgba(0,0,0,.10); cursor:zoom-in; transition:transform .15s; }
.tut-fig img:hover{ transform:scale(1.015); }
.tut-fig figcaption{ font-size:12.5px; font-weight:600; letter-spacing:.2px; color:var(--ink2); line-height:1.35; margin-top:11px; }

/* beneficios */
.benefits{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:14px; }
.benefit{ display:flex; align-items:center; gap:11px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
.benefit .bi{ width:38px; height:38px; border-radius:10px; background:var(--bg2); color:var(--ink); display:flex; align-items:center; justify-content:center; flex:0 0 auto; }
.benefit .bi svg{ width:19px; height:19px; }
.benefit .bt{ font-size:13.5px; font-weight:700; color:var(--ink); line-height:1.25; }
.benefit .bd{ font-size:11.5px; color:var(--ink3); margin-top:2px; }
@media(max-width:520px){ .benefits{ grid-template-columns:1fr; } }

/* ---- Reporte a pantalla completa ---- */
body.report-mode .top{ display:none; }
body.report-mode main{ max-width:none; margin:0; padding:0; }
body.report-mode #view{ display:flex; flex-direction:column; height:100vh; height:100dvh; }
body.report-mode .sec-head{ display:none; }
body.report-mode .footer{ display:none; }
body.report-mode .back{ margin:11px 0 11px 16px; align-self:flex-start; }
body.report-mode .sec-body{ flex:1; min-height:0; margin-top:0; }
.report-stage{ height:100%; background:#fff; }
.report-stage iframe{ width:100%; height:100%; border:0; display:block; }
</style>

  whatsapp: `
  <div class="manual">

    <p class="m-lead"><b>WhatsApp es nuestra mejor herramienta para acercar al cliente a la compra,</b> pero tiene reglas claras. Entenderlas no te limita: te da poder. El cliente nos abre la puerta cuando nos escribe, y tenemos 24 horas para charlar con total libertad. Pasado ese tiempo, todavía podemos volver a contactarlo de forma legal con plantillas aprobadas.</p>

    <div class="note">${svg(I.clock)}<div class="nt"><b>La idea en una frase:</b> el cliente abre la puerta cuando nos escribe, la aprovechamos dentro de las 24h, y la reabrimos con plantillas cuando hace falta. Todo lo demás cuelga de ahí.</div></div>

    <div class="m-block">
      <div class="m-kicker"><span class="n">1</span> LA HERRAMIENTA</div>
      <div class="m-h">Qué es WhatsApp Business API y por qué la usamos</div>
      <p class="m-sub">Existen tres WhatsApp distintos: el personal, la app Business (gratis, para un negocio chico en un solo teléfono) y la Business Platform, llamada API. Nosotros usamos la API porque está hecha para crecer.</p>
      <p class="m-p">La diferencia central es la escala. La app gratis funciona en un teléfono principal más hasta 4 dispositivos: todos ven los mismos chats, pero nadie sabe quién respondió a quién. Con la API, muchos vendedores atienden el mismo número a la vez sin pisarse, con la consulta de cada cliente registrada y medible en el sistema.</p>
      <p class="m-p">La API no se baja de una tienda de apps: se conecta a través de un proveedor oficial (BSP) o un CRM. Esto nos da algo clave para una mueblería: <b>profesionalismo y confianza</b>. Perfil de empresa, catálogo y el tilde de Cuenta Oficial verificada le dicen al cliente que habla con un negocio serio.</p>

      </div>

      <div class="note">${svg(I.check)}<div class="nt"><b>Dato:</b> en la API NO existe el viejo límite de 256 contactos. Ese tope es de las listas de difusión de la app del celular, no del sistema que usamos nosotros. La Cloud API está disponible para todas las empresas desde mayo de 2022.</div></div>

    <div class="m-block">
      <div class="m-kicker"><span class="n">2</span> LA REGLA DE ORO</div>
      <div class="m-h">La regla de las 24 horas: el cliente abre la puerta</div>
      <p class="m-sub">Cada vez que un cliente nos escribe o nos llama, se abre un reloj de 24 horas: la ventana de servicio. Mientras corre, respondemos con lo que queramos.</p>
      <p class="m-p">Texto, fotos del sillón, audios, videos, precios, ubicación de la sucursal: libertad total y sin costo. El reloj se cuenta desde el ÚLTIMO mensaje del cliente, no desde el nuestro.</p>

      <div class="flow">
        <div class="step"><div class="si" style="background:var(--c-success)">${svg(I.chatBubble)}</div><div class="st">Cliente escribe</div><div class="sd">Se abre la ventana de 24h</div></div>

      <p class="m-p"><b>Importante:</b> que nosotros contestemos NO estira la ventana. Lo único que vuelve el reloj a cero es que el cliente responda. Si la ventana está cerrada e intentás escribir libre, WhatsApp rechaza el mensaje y NO se entrega (error 131047, "mensaje de reenganche").</p>

    <div class="m-block">

      <p class="m-sub">Una plantilla es un mensaje pre-aprobado por Meta. Es la ÚNICA forma de escribirle primero a un cliente o de retomarlo después de las 24 horas. La aprobás una vez y la reutilizás siempre.</p>
      <p class="m-p">La plantilla se personaliza de verdad: con variables tipo {{1}} el sistema completa el nombre real del cliente, el modelo que consultó o la fecha. Parece escrito a mano, pero lo manda el sistema. Además sumás una foto del sillón en el encabezado y botones de un toque como "Ver catálogo", "Llamar ahora" o "Visitar sitio web".</p>

      <p class="m-p">Las tres categorías están vigentes desde junio de 2023. <b>Para difundir productos de la mueblería usamos siempre Marketing.</b> Toda plantilla pasa por revisión: muchas se aprueban en minutos de forma automática; si hace falta revisión humana, puede tardar hasta 48 horas.</p>

      <p class="m-sub">Los {{1}}, {{2}}… son variables: el sistema las reemplaza por los datos reales del cliente (nombre, modelo, sucursal, fecha). La categoría y los botones se eligen al crear la plantilla.</p>

      <div class="checklist">
        <div class="ci">${svg(I.check)} Etiquetas = ordenar la bandeja. Plantillas = enviar al segmento</div>
        <div class="ci">${svg(I.check)} App: 5 etiquetas fijas + 20 propias; difusión hasta 256 agendados</div>
        <div class="ci">${svg(I.check)} En la API la segmentación vive en el CRM, no en WhatsApp</div>
        <div class="ci">${svg(I.check)} Segmentá por sucursal/zona y por interés de producto</div>
        <div class="ci">${svg(I.check)} A cada grupo, su oferta: más ventas y menos bloqueos</div>
      </div>

      <div class="note">${svg(I.tag)}<div class="nt"><b>Tip:</b> si una plantilla de Utilidad tiene contenido de promoción, Meta la reclasifica como Marketing. Para ofertas, armala directamente como Marketing desde el principio.</div></div>
    </div>

    <div class="m-block">
      <div class="m-kicker"><span class="n">6</span> SIN DESHACER</div>
      <div class="m-h">Cuidado al enviar: no se puede editar ni borrar</div>
      <p class="m-sub">Una diferencia clave con el WhatsApp del celular: desde la API (el sistema que usamos) un mensaje o una imagen, una vez enviados, NO se pueden editar ni eliminar.</p>

      <div class="benefits">
        <div class="benefit"><div class="bi">${svg(I.phone)}</div><div><div class="bt">WhatsApp común (celular)</div><div class="bd">Podés editar el mensaje (hasta 15 min) y borrarlo para todos</div></div></div>
        <div class="benefit"><div class="bi">${svg(I.lock)}</div><div><div class="bt">WhatsApp API (nuestro sistema)</div><div class="bd">No hay editar ni borrar: lo enviado queda firme</div></div></div>
      </div>

      <p class="m-p"><b>¿Por qué?</b> La API es un canal automatizado, de envío masivo y auditable. Meta solo habilita <b>enviar, marcar como leído, reacciones y el "escribiendo…"</b>. Editar y "eliminar para todos" son comodidades de la app personal, no parte de la mensajería de empresa: los mensajes del negocio quedan firmes y registrados (trazabilidad), y así se evita mandar algo y borrarlo para esquivar el control.</p>

      <div class="note">${svg(I.shield)}<div class="nt"><b>Regla práctica:</b> revisá la imagen, el precio y el texto <b>antes</b> de enviar. No hay "deshacer". Si te equivocaste, la única salida es mandar un mensaje nuevo aclarando o corrigiendo.</div></div>
    </div>

    <div class="m-block">
      <div class="m-kicker"><span class="n">7</span> PARA LLEVARSE</div>
      <div class="m-h">Cierre: buenas prácticas para vender cumpliendo</div>
      <p class="m-sub">El resumen es simple y se sostiene en una sola idea: el cliente abre la puerta cuando nos escribe, la aprovechamos dentro de las 24h, y la reabrimos de forma legal con plantillas cuando hace falta.</p>
      <p class="m-p">Si trabajás dentro de la ventana, cerrás más rápido y sin costos. Si la ventana se cerró, no fuerces texto libre (no llega): mandá una plantilla relevante y dejá que el cliente reabra la charla. Y nunca arranques una conversación promocional sin permiso. Cuidar la calidad del número es cuidar tu herramienta de trabajo.</p>

      <div class="benefits">
        <div class="benefit"><div class="bi">${svg(I.clock)}</div><div><div class="bt">Aprovechá la ventana de 24h</div><div class="bd">Ahí vendés libre, con fotos y precios, sin costo</div></div></div>
        <div class="benefit"><div class="bi">${svg(I.lock)}</div><div><div class="bt">Fuera de la ventana, solo plantillas</div><div class="bd">Nunca texto libre forzado</div></div></div>
        <div class="benefit"><div class="bi">${svg(I.check)}</div><div><div class="bt">Sin permiso no hay difusión</div><div class="bd">Pedí siempre el opt-in</div></div></div>
        <div class="benefit"><div class="bi">${svg(I.funnel)}</div><div><div class="bt">Personalizá y segmentá</div><div class="bd">A cada cliente, lo que le interesa</div></div></div>
        <div class="benefit"><div class="bi">${svg(I.shield)}</div><div><div class="bt">Respetá la baja y no satures</div><div class="bd">Protegés el número y el alcance</div></div></div>
        <div class="benefit"><div class="bi">${svg(I.refresh)}</div><div><div class="bt">La plantilla no es spam</div><div class="bd">Es el mecanismo legal de Meta para reabrir el contacto</div></div></div>
      </div>

      <div class="note">${svg(I.card)}<div class="nt"><b>Antes de prometer costos</b> a un cliente o a la gerencia, confirmá las tarifas vigentes con el proveedor: desde julio de 2025 el cobro es por mensaje de plantilla entregado, según categoría.</div></div>
    </div>

    <div class="m-block">
      <div class="m-kicker">${svg(I.award)} PUNTOS PARA RECORDAR</div>
      <div class="checklist">
        <div class="ci">${svg(I.check)} El cliente abre la puerta: cuando te escribe se abre una ventana de 24h para charlar libre, con fotos y precios, sin costo</div>
        <div class="ci">${svg(I.check)} La ventana se cuenta desde el último mensaje DEL CLIENTE y se reinicia cada vez que él responde; tu respuesta no la estira</div>
        <div class="ci">${svg(I.check)} Fuera de las 24h solo se contacta con plantillas aprobadas; el texto libre se rechaza y no llega (error 131047)</div>
        <div class="ci">${svg(I.check)} La plantilla se aprueba una vez y se reutiliza siempre: personalizala con nombre, sumá foto y botones de un toque</div>
        <div class="ci">${svg(I.check)} Difusión masiva real = plantilla aprobada + permiso (opt-in); arranca en 250 personas/día y crece con calidad hasta Ilimitado</div>
        <div class="ci">${svg(I.check)} Segmentá en el CRM por zona y por producto, y mandá a cada grupo su oferta: vende más y baja los bloqueos</div>
        <div class="ci">${svg(I.check)} Cuidá la calidad del número (verde): respetá la baja, no satures y enviá solo a quien dio el OK</div>
        <div class="ci">${svg(I.check)} Desde la API no se puede editar ni borrar lo enviado: revisá bien la imagen, el precio y el texto antes de mandar</div>
      </div>
    </div>

  </div>`,
  embajadores: `
  <div class="manual">
    <p class="m-lead"><b>Programa de Embajadores MyS:</b> una propuesta exclusiva para <b>arquitectos y decoradores</b> que trabajan con nosotros. Compartiles esta placa: pueden <b>escanear el QR</b> para sumarse y empezar a recomendar nuestros productos en sus proyectos.</p>
    <figure class="flyer">
      <img src="assets/embajadores/Programa de Embajadores.jpg" alt="Programa de Embajadores MyS · Exclusivo para arquitectos y decoradores" loading="lazy" onclick="openLightbox('assets/embajadores/Programa de Embajadores.jpg','Programa de Embajadores MyS')">
    </figure>
    <a class="cta" href="assets/embajadores/Programa de Embajadores.jpg" download="Programa de Embajadores MyS.jpg">${svg(I.download)} Descargar placa</a>

/* ---- render ---- */
const botonera = document.getElementById('botonera');
function seccionLista(t){ return t.ready || ((window.GALLERIES||{})[t.key]||[]).length>0; }
function renderBotonera(){ botonera.innerHTML = TILES.map(t=>{ const r=seccionLista(t); return `
  <button class="tile${r?'':' locked'}"${r?` onclick="openSection('${t.key}')"`:' aria-disabled="true" disabled'}>
    <span class="num">${String(t.n).padStart(2,'0')}</span>
    <div class="icirc" style="background:var(${t.color})">${svg(I[t.icon])}</div>
    <div class="tt">${t.title}</div>
    <div class="td">${t.desc}</div>
    <span class="chip ${r?'ok':'soon'}"><span class="dot"></span>${r?'Disponible':'Próximamente'}</span>
  </button>`; }).join(''); }

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function galleryHTML(items, t){
  return `<p class="lead">${esc(t.desc)} Tocá una imagen para verla en grande, o el botón <b>Descargar</b> para guardarla en tu celular.</p>
  <div class="gallery">` + items.map(it=>`
    <div class="gcard">
      <img class="gimg" src="${esc(it.file)}" alt="${esc(it.title)}" loading="lazy" onclick="openLightbox('${esc(it.file)}','${esc(it.download||it.title)}')">
      <div class="gmeta">
        <div class="gtitle">${esc(it.title)}</div>
        <a class="dl-btn" href="${esc(it.file)}" download="${esc(it.download||it.title)}">${svg(I.download)} Descargar</a>
      </div>
    </div>`).join('') + `</div>`;
}
function galleryGrid(items){
  return `<div class="gallery">` + items.map(it=>`
    <div class="gcard">
      <img class="gimg" src="${esc(it.file)}" alt="${esc(it.title)}" loading="lazy" onclick="openLightbox('${esc(it.file)}','${esc(it.download||it.title)}')">
      <div class="gmeta">
        <div class="gtitle">${esc(it.title)}</div>
        <a class="dl-btn" href="${esc(it.file)}" download="${esc(it.download||it.title)}">${svg(I.download)} Descargar</a>
      </div>
    </div>`).join('') + `</div>`;
}
function groupsHTML(groups){
  const G = window.GALLERIES||{};
  let html = `<p class="lead">Todo el material para descargar y compartir con tus clientes, ordenado por tipo. Tocá una imagen para verla en grande, o usá <b>Descargar</b> para guardarla en tu celular.</p>`;
  let n = 0;
  groups.forEach(g=>{
    const items = G[g.key] || [];
    n++;
    const cuerpo = items.length
      ? galleryGrid(items)
      : `<div class="empty-cat">${svg(I.image)} Sin imagen para descargar por el momento.</div>`;
    html += `<div class="m-block"${n===1?' style="margin-top:26px"':''}>
      <div class="m-kicker"><span class="n">${n}</span> ${esc(g.title)}</div>
      ${cuerpo}
    </div>`;
  });
  if(!n) html = pendingHTML({title:'Material descargable'});
  return html;
}
function pendingHTML(t){
  return `<div class="pending">
      <div class="icirc">${svg(I.clock)}</div>
      <h3>Sección en preparación</h3>
      <p>Todavía no cargamos el contenido de <b>${esc(t.title)}</b>. En cuanto nos pases la info o los archivos, lo dejamos disponible acá.</p>
    </div>`;
}
function openLightbox(src, name){
  const lb=document.getElementById('lightbox');
  lb.innerHTML = `<button class="lb-close" aria-label="Cerrar" onclick="event.stopPropagation();closeLightbox()">${svg(I.x)}</button><img id="lbimg" src="${esc(src)}" alt="Vista ampliada" onclick="event.stopPropagation()"><a class="dl-btn lb-dl" href="${esc(src)}" download="${esc(name||'')}" onclick="event.stopPropagation()">${svg(I.download)} Descargar</a>`;
  lb.hidden=false;
}
function closeLightbox(){ document.getElementById('lightbox').hidden=true; }
document.addEventListener('keydown', e=>{ if(e.key==='Escape'){ closeLightbox(); closeMenu(); } });
function openSection(key){ location.hash = key; }
function renderSection(key){
  const t = MAP[key];
  document.getElementById('secIcon').style.background = `var(${t.color})`;
  document.getElementById('secIcon').innerHTML = svg(I[t.icon]);
  document.getElementById('secTitle').textContent = t.title;
  document.getElementById('secSub').textContent = t.desc;
  const imgs = (window.GALLERIES||{})[key] || [];
  let body;
  if(DOWNLOAD_GROUPS[key]) body = groupsHTML(DOWNLOAD_GROUPS[key]);
  else if(CONTENT[key]) body = CONTENT[key];
  else if(imgs.length) body = galleryHTML(imgs, t);
  else body = pendingHTML(t);
  document.getElementById('secBody').innerHTML = body;
  document.body.classList.toggle('report-mode', key==='reporte');
  document.getElementById('hub').hidden = true;
  document.getElementById('view').hidden = false;
  document.getElementById('homeBtn').hidden = false;
  window.scrollTo(0,0);
}
function showHub(){
  if(location.hash){ location.hash=''; return; } // hashchange dispara route()
  document.body.classList.remove('report-mode');
  document.getElementById('view').hidden = true;
  document.getElementById('hub').hidden = false;
  document.getElementById('homeBtn').hidden = true;
  window.scrollTo(0,0);
}
/* ---- menu de navegacion (mobile) ---- */
function renderNav(){
  const list = document.getElementById('navList');
  const inicio = `<button class="nav-item" onclick="navHome()">
    <span class="ni-ic" style="background:var(--ink)">${svg(I.home)}</span>
    <span class="ni-tx"><span class="ni-t">Inicio</span><span class="ni-d">Volver al centro de recursos</span></span>
  </button>`;
  list.innerHTML = inicio + TILES.map(t=>{ const r=seccionLista(t); return `
    <button class="nav-item${r?'':' locked'}"${r?` onclick="navTo('${t.key}')"`:' aria-disabled="true" disabled'}>
      <span class="ni-ic" style="background:var(${t.color})">${svg(I[t.icon])}</span>
      <span class="ni-tx"><span class="ni-t">${t.title}</span><span class="ni-d">${t.desc}</span></span>
      <span class="chip ${r?'ok':'soon'}"><span class="dot"></span>${r?'Disponible':'Próximamente'}</span>
    </button>`; }).join('');
}
function openMenu(){ renderNav(); const nm=document.getElementById('navmenu'); nm.hidden=false; document.body.classList.add('menu-open'); void nm.offsetWidth; nm.classList.add('open'); }
function closeMenu(){ const nm=document.getElementById('navmenu'); if(nm.hidden) return; nm.classList.remove('open'); document.body.classList.remove('menu-open'); setTimeout(()=>{ nm.hidden=true; }, 240); }
function navTo(key){ closeMenu(); location.hash = key; }
function navHome(){ closeMenu(); showHub(); }

function route(){
  closeMenu();
  const key = decodeURIComponent(location.hash.slice(1));
  if(key && MAP[key]) renderSection(key);
  else { document.body.classList.remove('report-mode'); document.getElementById('view').hidden=true; document.getElementById('hub').hidden=false; document.getElementById('homeBtn').hidden=true; }
}
window.addEventListener('hashchange', route);
/* carga las galerias siempre frescas (evita problemas de cache al actualizar imagenes) */
(function(){
  var g=document.createElement('script');
  g.src='galerias.js?v='+(new Date().getTime());
  g.onload=function(){ renderBotonera(); route(); };
  g.onerror=function(){ window.GALLERIES=window.GALLERIES||{}; renderBotonera(); route(); };
  document.head.appendChild(g);
})();
</script>
</body>
</html>
